<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StepMate</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  margin:0;
  background:#f5f5f7;
  color:#1d1d1f;
  text-align:center;
}

.header{
  padding:90px 20px 60px;
  background:linear-gradient(180deg,#ffffff 0%,#f5f5f7 100%);
}

.brandRow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
}

.logo{
  width:60px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,0.18);
}

.brand{
  font-size:46px;
  margin:0;
}

.author{
  font-size:15px;
  color:#6e6e73;
  margin-top:8px;
}

.subtitle{
  font-size:20px;
  color:#6e6e73;
  margin-top:10px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:80px 20px;
}

.icon{
  width:160px;
  border-radius:36px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

h1{
  font-size:42px;
  margin-top:20px;
}

.description{
  font-size:18px;
  color:#6e6e73;
  max-width:600px;
  margin:auto;
  margin-top:14px;
  line-height:1.6;
}

.screens{
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  transform:translateZ(0);
}

.screens img{
  width:220px;
  display:block;
  background:transparent;

  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  transition:transform .35s cubic-bezier(.4,0,.2,1);

  will-change:transform;
  transform:translate3d(0,0,0);
  backface-visibility:hidden;
  perspective:1000px;
}

.screens img:hover{
  transform:translateY(-8px) scale(1.025);
}

.button{
  display:inline-block;
  margin-top:50px;
  padding:14px 28px;
  background:black;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:500;
}

.back{
  display:block;
  margin-top:30px;
  color:#6e6e73;
  text-decoration:none;
}

.footer{
  padding:40px;
  color:#6e6e73;
  font-size:14px;
}
</style>
</head>

<body>

<header class="header">
  <div class="brandRow">
    <img src="GrowMate_icon.png" class="logo">
    <h1 class="brand">GrowMate</h1>
  </div>
  <p class="author">by Patrik Porteš</p>
  <p class="subtitle">Simple apps for everyday life.</p>
</header>

<div class="container">

  <img class="icon" src="StepMate_icon.png">

  <h1>StepMate</h1>

  <p class="description">
    Track your daily steps and stay active.<br>
    Stay motivated and reach your goals every day.
  </p>

  <div class="screens">
    <img src="stepmate_screen1.png">
    <img src="stepmate_screen2.png">
    <img src="stepmate_screen3.png">
  </div>

  <a class="button" href="https://apps.apple.com/us/app/stepmate/id6760427586" target="_blank">
    Download on the App Store
  </a>

  <a class="back" href="index.html">← Back to apps</a>

</div>

<footer class="footer">
  <p>Contact: info@growmate.cz</p>
  <p>© 2026 GrowMate</p>
</footer>

</body>
</html>
